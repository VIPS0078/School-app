<!DOCTYPE html>
<html>
<head>
  <title>VED INTERNATIONAL PUBLIC SCHOOL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin:0;
      color:gold;
      height:100vh;
      background: url('school.jpg') no-repeat center center;
      background-size: cover;
    }

    body::before {
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.3);
      z-index:-1;
    }

    header {
      height:60px;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
    }

    .logo {
      width:30px;
      height:30px;
      border-radius:50%;
      animation: zoom 3s infinite;
    }

    @keyframes zoom {
      0%{transform:scale(1);}
      50%{transform:scale(1.2);}
      100%{transform:scale(1);}
    }

    .title {
      font-size:16px;
      font-weight:600;
      max-width:65%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      background: linear-gradient(90deg, gold, white, gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      display:flex;
      justify-content:center;
      align-items:center;
      height: calc(100vh - 60px);
      padding:10px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      padding:20px;
      border-radius:16px;
      border:1px solid gold;
      width:90%;
      max-width:350px;
      text-align:center;
    }

    button, select, textarea, input {
      width:100%;
      padding:12px;
      margin:8px 0;
      border-radius:10px;
      border:none;
    }

    button {
      background:#000;
      color:gold;
      font-weight:600;
    }

    .back-btn { background:#333; }
    .hidden { display:none; }

    .hw-card {
      background: rgba(0,0,0,0.7);
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      border:1px solid gold;
    }

    .subject { padding:4px 8px; border-radius:6px; color:white; font-weight:bold; }
    .Math {background:#1E88E5;}
    .English {background:#43A047;}
    .Science {background:#FB8C00;}
    .Social {background:#8E24AA;}
    .Hindi {background:#E53935;}
    .Kannada {background:#3F51B5;}
    .ICT {background:#00ACC1;}
    .ArtCraft {background:#F4511E;}
  </style>
</head>

<body>

<header>
  <img src="logo.jpg" class="logo">
  <span class="title">VED INTERNATIONAL PUBLIC SCHOOL</span>
  <img src="logo.jpg" class="logo">
</header>

<div class="container">

<div class="card" id="roleCard">
  <h3>Select User</h3>
  <button onclick="showTeacher()">👨‍🏫 Teacher</button>
  <button onclick="showParent()">👨‍👩‍👧 Parent</button>
</div>

<div class="card hidden" id="teacherLogin">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <h3>Teacher Login</h3>
  <input type="password" id="teacherPass">
  <button onclick="loginTeacher()">Login</button>
</div>

<div class="card hidden" id="teacherPanel">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <h3>Teacher Panel</h3>

  <select id="hwClass">
    <option value="">Select Class</option>
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option>
  </select>

  <select id="subject">
    <option value="">Select Subject</option>
    <option>Math</option><option>English</option>
    <option>Science</option><option>Social</option>
    <option>Hindi</option><option>Kannada</option>
    <option>ICT</option><option>ArtCraft</option>
  </select>

  <textarea id="homework" placeholder="Speak or type homework"></textarea>
  <button onclick="startVoice()">🎤 Speak</button>
  <button onclick="saveHomework()">Save Homework</button>
</div>

<div class="card hidden" id="parentPanel">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <h3>Parent Portal</h3>

  <select id="viewClass" onchange="displayHomework()">
    <option value="">Select Class</option>
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option>
  </select>

  <div id="hwList"></div>
</div>

</div>

<!-- ✅ Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtEWzCpf5hVfYoqcj6_GqVLbUuZdHMrmw",
  authDomain: "homework-app-1c831.firebaseapp.com",
  projectId: "homework-app-1c831",
  storageBucket: "homework-app-1c831.firebasestorage.app",
  messagingSenderId: "888130243111",
  appId: "1:888130243111:web:be2fbf4bfe9aa9b357dc02"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.addDoc = addDoc;
  window.collection = collection;
  window.getDocs = getDocs;
  window.query = query;
  window.where = where;
</script>

<script>
// ✅ Voice feature (UNCHANGED)
function startVoice() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Use Chrome");
    return;
  }

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(() => {
      const recognition = new webkitSpeechRecognition();
      let subject = document.getElementById("subject").value;

      recognition.lang = subject === "Hindi" ? "hi-IN" :
                         subject === "Kannada" ? "kn-IN" : "en-IN";

      recognition.onresult = (e) => {
        homework.value = e.results[0][0].transcript;
      };

      recognition.start();
    })
    .catch(() => alert("Mic denied"));
}

// UI functions
function showTeacher(){ roleCard.classList.add("hidden"); teacherLogin.classList.remove("hidden"); }
function showParent(){ roleCard.classList.add("hidden"); parentPanel.classList.remove("hidden"); }
function goBack(){
  teacherLogin.classList.add("hidden");
  teacherPanel.classList.add("hidden");
  parentPanel.classList.add("hidden");
  roleCard.classList.remove("hidden");
}

function loginTeacher(){
  if(document.getElementById("teacherPass").value === "1234"){
    teacherLogin.classList.add("hidden");
    teacherPanel.classList.remove("hidden");
  } else alert("Wrong password");
}

// ✅ Firebase save
async function saveHomework(){
  let data = {
    cls: hwClass.value,
    subject: subject.value,
    hw: homework.value,
    date: new Date().toLocaleDateString()
  };

  if(!data.cls || !data.subject || !data.hw){
    alert("Fill all fields"); return;
  }

  await addDoc(collection(db, "homeworks"), data);
  alert("Saved!");
  homework.value = "";
}

// ✅ Firebase fetch
async function displayHomework(){
  let cls = viewClass.value;
  let list = document.getElementById("hwList");
  list.innerHTML = "";

  const q = query(collection(db, "homeworks"), where("cls", "==", cls));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    list.innerHTML = "No homework";
    return;
  }

  snapshot.forEach(doc => {
    let h = doc.data();
    list.innerHTML += `
      <div class="hw-card">
        <div class="subject ${h.subject}">${h.subject}</div>
        <div>📅 ${h.date}</div>
        <div>📝 ${h.hw}</div>
      </div>`;
  });
}
</script>

</body>
</html>
